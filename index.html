<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador Nativo OBS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #121214; /* Fundo escuro para teste visual */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
        }
        .visualizer-container {
            width: 95%;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="visualizer-container">
        <canvas id="visualizer"></canvas>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('visualizer');
            const canvasCtx = canvas.getContext('2d');
            
            const numberOfBars = 60;
            let dataArray = new Array(numberOfBars).fill(0);
            let volumeSuave = 0;

            function resizeCanvas() {
                canvas.width = canvas.parentElement.clientWidth;
                canvas.height = canvas.parentElement.clientHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // Intercepta o áudio nativo que o OBS injeta diretamente na página
            if (window.obsStudio && window.obsStudio.on) {
                window.obsStudio.on('audioLevels', (levels) => {
                    // levels[0] traz a estrutura de volume do canal esquerdo tocando no OBS
                    if (levels && levels[0]) {
                        // Captura a magnitude do som (vai de 0.0 a 1.0)
                        volumeSuave = levels[0].magnitude || 0;
                    }
                });
            } else {
                // Simulação apenas para quando você testar fora do OBS (no Chrome comum)
                setInterval(() => {
                    volumeSuave = 0.1 + Math.random() * 0.4;
                }, 80);
            }

            function draw() {
                requestAnimationFrame(draw);
                canvasCtx.clearRect(0, 0, canvas.width, canvas.height);

                const barWidth = 3;
                const barGap = 2;
                const totalBarWidth = barWidth + barGap;
                const currentBars = Math.min(numberOfBars, Math.floor(canvas.width / totalBarWidth));
                const centerY = canvas.height / 2;

                // Amortece a queda para a movimentação ficar idêntica à imagem (suave)
                if (!window.obsStudio) {
                    volumeSuave *= 0.9;
                }

                for (let i = 0; i < currentBars; i++) {
                    // Distribui o volume em formato de onda (senoide)
                    let fatorForma = Math.sin((i / currentBars) * Math.PI);
                    
                    // Multiplicador de ganho baseado no volume capturado
                    let barHeight = (volumeSuave * 255) * fatorForma * (0.7 + Math.random() * 0.3);
                    
                    // Mantém a linha central contínua mesmo se estiver em silêncio absoluto
                    if (barHeight < 2) barHeight = 2; 

                    const x = i * totalBarWidth;
                    canvasCtx.fillStyle = '#FFFFFF';
                    canvasCtx.fillRect(x, centerY - barHeight / 2, barWidth, barHeight);
                }
            }

            draw();
        });
    </script>
</body>
</html>
