<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Audio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #121214; /* Cor escura para você ver que a página carregou e não está em branco */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
        }
        .visualizer-container {
            width: 95%;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="visualizer-container">
        <canvas id="visualizer"></canvas>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('visualizer');
            const canvasCtx = canvas.getContext('2d');
            
            let audioCtx = null;
            let analyser = null;
            let dataArray = null;
            let bufferLength = 0;

            function resizeCanvas() {
                canvas.width = canvas.parentElement.clientWidth;
                canvas.height = canvas.parentElement.clientHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // Desenha a linha estática inicial para você ver que o canvas existe
            function drawStaticLine() {
                canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
                const barWidth = 3;
                const barGap = 2;
                const totalBarWidth = barWidth + barGap;
                const numberOfBars = Math.floor(canvas.width / totalBarWidth);
                const centerY = canvas.height / 2;

                for (let i = 0; i < numberOfBars; i++) {
                    const x = i * totalBarWidth;
                    canvasCtx.fillStyle = '#FFFFFF';
                    canvasCtx.fillRect(x, centerY - 1, barWidth, 2);
                }
            }
            drawStaticLine();

            function initAudio() {
                if (audioCtx) return;

                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContextClass();
                analyser = audioCtx.createAnalyser();
                
                analyser.fftSize = 256; 
                analyser.smoothingTimeConstant = 0.82; 
                
                bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);

                navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    }, 
                    video: false 
                })
                .then(stream => {
                    const source = audioCtx.createMediaStreamSource(stream);
                    source.connect(analyser);
                    draw();
                })
                .catch(err => {
                    console.error("Erro de áudio:", err);
                });
            }

            function draw() {
                requestAnimationFrame(draw);
                analyser.getByteFrequencyData(dataArray);
                canvasCtx.clearRect(0, 0, canvas.width, canvas.height);

                const barWidth = 3;
                const barGap = 2;
                const totalBarWidth = barWidth + barGap;
                const numberOfBars = Math.floor(canvas.width / totalBarWidth);
                const centerY = canvas.height / 2;

                for (let i = 0; i < numberOfBars; i++) {
                    const dataIndex = Math.floor((i / numberOfBars) * bufferLength);
                    let value = dataArray[dataIndex] || 0;
                    let barHeight = (value / 255) * (canvas.height * 0.85);
                    
                    if (barHeight < 2) barHeight = 2; 

                    const x = i * totalBarWidth;
                    canvasCtx.fillStyle = '#FFFFFF';
                    canvasCtx.fillRect(x, centerY - barHeight / 2, barWidth, barHeight);
                }
            }

            window.addEventListener('click', initAudio);
        });
    </script>
</body>
</html>
