<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador OBS WebSocket</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #121214; /* Cor escura de teste */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
        }
        .visualizer-container {
            width: 95%;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas { width: 100%; height: 100%; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/obs-websocket-js@5.0.5/dist/obs-websocket.js"></script>
</head>
<body>

    <div class="visualizer-container">
        <canvas id="visualizer"></canvas>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('visualizer');
            const canvasCtx = canvas.getContext('2d');
            const obs = new OBSWebSocket();

            let numberOfBars = 60;
            let dataArray = new Array(numberOfBars).fill(0);
            let currentVolume = 0;

            function resizeCanvas() {
                canvas.width = canvas.parentElement.clientWidth;
                canvas.height = canvas.parentElement.clientHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // Conecta ao OBS localmente
            async function connectOBS() {
                try {
                    // Conecta no endereço padrão do OBS local
                    await obs.connect('ws://127.0.0.1:4455');
                    console.log('Conectado ao OBS com sucesso!');

                    // Escuta as atualizações de áudio de todas as fontes do OBS
                    obs.on('InputVolumeMeters', (data) => {
                        // IMPORTANTE: Mude 'Áudio do Desktop' ou 'Spotify' para o NOME EXATO da sua fonte no OBS
                        const spotifyInput = data.inputs.find(input => 
                            input.inputName === 'Spotify' || input.inputName === 'Áudio do Desktop'
                        );

                        if (spotifyInput && spotifyInput.inputVolumeMul) {
                            // Pega o volume atual (magnitude)
                            currentVolume = spotifyInput.inputVolumeMul[0] || 0; 
                        }
                    });

                } catch (error) {
                    console.error('Erro ao conectar no OBS WebSocket:', error);
                }
            }

            function draw() {
                requestAnimationFrame(draw);
                canvasCtx.clearRect(0, 0, canvas.width, canvas.height);

                const barWidth = 3;
                const barGap = 2;
                const totalBarWidth = barWidth + barGap;
                const currentBars = Math.min(numberOfBars, Math.floor(canvas.width / totalBarWidth));
                const centerY = canvas.height / 2;

                // Suaviza a queda do volume para não ficar piscando seco
                currentVolume *= 0.92;

                for (let i = 0; i < currentBars; i++) {
                    // Cria uma onda matemática baseada no volume do OBS
                    let factor = Math.sin((i / currentBars) * Math.PI);
                    let barHeight = currentVolume * (canvas.height * 0.9) * factor * (0.7 + Math.random() * 0.3);
                    
                    if (barHeight < 2) barHeight = 2; 

                    const x = i * totalBarWidth;
                    canvasCtx.fillStyle = '#FFFFFF';
                    canvasCtx.fillRect(x, centerY - barHeight / 2, barWidth, barHeight);
                }
            }

            connectOBS();
            draw();
        });
    </script>
</body>
</html>
