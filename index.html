<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Áudio - Corrigido</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #121214; /* Fundo escuro para você testar visualmente */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
        }
        .visualizer-container {
            width: 95%;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="visualizer-container">
        <canvas id="visualizer"></canvas>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('visualizer');
            const canvasCtx = canvas.getContext('2d');
            
            const barWidth = 3;
            const barGap = 2;
            const totalBarWidth = barWidth + barGap;
            
            let numberOfBars = 0;
            let audioData = [];

            function resizeCanvas() {
                canvas.width = canvas.parentElement.clientWidth;
                canvas.height = canvas.parentElement.clientHeight;
                numberOfBars = Math.floor(canvas.width / totalBarWidth);
                if (audioData.length !== numberOfBars) {
                    audioData = new Array(numberOfBars).fill(0);
                }
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            function draw() {
                requestAnimationFrame(draw);
                
                // CHECAGEM DE SEGURANÇA: Só roda se o objeto e a função existirem no OBS
                if (typeof window.obsStudio !== 'undefined' && typeof window.obsStudio.getAudioSpectrum === 'function') {
                    const spectrum = window.obsStudio.getAudioSpectrum();
                    if (spectrum && spectrum.length > 0) {
                        for (let i = 0; i < numberOfBars; i++) {
                            let specIndex = Math.floor((i / numberOfBars) * spectrum.length);
                            audioData[i] = spectrum[specIndex] || 0;
                        }
                    }
                } else {
                    // Modo de Simulação Organica para o Navegador Comum (Não quebra mais!)
                    const time = Date.now() * 0.004;
                    for (let i = 0; i < numberOfBars; i++) {
                        let base = Math.sin(i * 0.05 - time) * Math.cos(i * 0.02 + time);
                        let wave = Math.abs(base) * (0.3 + Math.sin(time + i * 0.1) * 0.2);
                        audioData[i] = audioData[i] * 0.8 + wave * 0.2;
                    }
                }

                // Limpa e redesenha o Canvas
                canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
                const centerY = canvas.height / 2;

                for (let i = 0; i < numberOfBars; i++) {
                    let magnitude = audioData[i];
                    let barHeight = magnitude * canvas.height * 0.9;
                    
                    if (barHeight < 2) barHeight = 2; // Mantém a linha contínua em silêncio

                    const x = i * totalBarWidth;
                    canvasCtx.fillStyle = '#FFFFFF';
                    canvasCtx.fillRect(x, centerY - barHeight / 2, barWidth, barHeight);
                }
            }

            draw();
        });
    </script>
</body>
</html>
