<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Áudio Real - OBS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: transparent; /* Mude para #121214 se quiser testar com fundo escuro */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
        }
        .visualizer-container {
            width: 95%;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="visualizer-container">
        <canvas id="visualizer"></canvas>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('visualizer');
            const canvasCtx = canvas.getContext('2d');
            
            // Configurações das barras brancas identicas à foto original
            const barWidth = 3;
            const barGap = 2;
            const totalBarWidth = barWidth + barGap;
            
            let numberOfBars = 0;
            let audioData = [];

            function resizeCanvas() {
                canvas.width = canvas.parentElement.clientWidth;
                canvas.height = canvas.parentElement.clientHeight;
                numberOfBars = Math.floor(canvas.width / totalBarWidth);
                if (audioData.length === 0) {
                    audioData = new Array(numberOfBars).fill(0);
                }
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // Renderização contínua do Canvas
            function draw() {
                requestAnimationFrame(draw);
                
                // Se estiver no OBS, pegamos as frequências reais direto da API do OBS
                if (window.obsStudio && window.obsStudio.getAudioSpectrum) {
                    // Retorna um array de frequências do áudio que está passando pela fonte
                    const spectrum = window.obsStudio.getAudioSpectrum();
                    if (spectrum && spectrum.length > 0) {
                        for (let i = 0; i < numberOfBars; i++) {
                            // Mapeia o espectro do OBS para o nosso número de barras
                            let specIndex = Math.floor((i / numberOfBars) * spectrum.length);
                            audioData[i] = spectrum[specIndex] || 0;
                        }
                    }
                } else {
                    // Modo de Simulação Suave para quando testar fora do OBS (Navegador Comum)
                    // Cria uma onda que sobe e desce organicamente para simular música
                    const time = Date.now() * 0.004;
                    for (let i = 0; i < numberOfBars; i++) {
                        let base = Math.sin(i * 0.05 - time) * Math.cos(i * 0.02 + time);
                        let wave = Math.abs(base) * (0.3 + Math.sin(time + i * 0.1) * 0.2);
                        // Suaviza a transição para não dar saltos bruscos
                        audioData[i] = audioData[i] * 0.8 + wave * 0.2;
                    }
                }

                // Limpa a tela
                canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
                const centerY = canvas.height / 2;

                // Desenha as barras horizontais espelhadas
                for (let i = 0; i < numberOfBars; i++) {
                    let magnitude = audioData[i];
                    
                    // Ajusta a altura da barra baseado na intensidade do áudio
                    let barHeight = magnitude * canvas.height * 0.9;
                    
                    // Linha contínua mínima de 2px para quando estiver em silêncio
                    if (barHeight < 2) barHeight = 2; 

                    const x = i * totalBarWidth;
                    canvasCtx.fillStyle = '#FFFFFF';
                    canvasCtx.fillRect(x, centerY - barHeight / 2, barWidth, barHeight);
                }
            }

            draw();
        });
    </script>
</body>
</html>
