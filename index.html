<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Áudio Real</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: transparent; /* Transparente para a live */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
        }
        .visualizer-container {
            width: 95%;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="visualizer-container">
        <canvas id="visualizer"></canvas>
    </div>

    <script>
        window.onload = function() {
            const canvas = document.getElementById('visualizer');
            const canvasCtx = canvas.getContext('2d');
            
            let audioCtx = null;
            let analyser = null;
            let dataArray = null;
            let bufferLength = 0;

            function resizeCanvas() {
                canvas.width = canvas.parentElement.clientWidth;
                canvas.height = canvas.parentElement.clientHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // Inicializa o áudio de forma segura
            function initAudio() {
                if (audioCtx) return; // Evita inicializar duplicado se clicar várias vezes

                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                
                // Configurações para suavizar a onda (evita o efeito de piscar frenético)
                analyser.fftSize = 256; 
                analyser.smoothingTimeConstant = 0.82; 
                
                bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);

                // Captura o som do sistema/microfone
                navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    }, 
                    video: false 
                })
                .then(stream => {
                    const source = audioCtx.createMediaStreamSource(stream);
                    source.connect(analyser);
                    draw();
                })
                .catch(err => {
                    console.error("Erro ao acessar dispositivo de áudio:", err);
                });
            }

            function draw() {
                requestAnimationFrame(draw);

                // Captura os dados de frequência atuais
                analyser.getByteFrequencyData(dataArray);

                // Limpa o canvas de forma estável para evitar o "flicker" (piscar)
                canvasCtx.clearRect(0, 0, canvas.width, canvas.height);

                const barWidth = 3; // Largura das barras brancas
                const barGap = 2;   // Espaço entre as barras
                const totalBarWidth = barWidth + barGap;
                const numberOfBars = Math.floor(canvas.width / totalBarWidth);
                const centerY = canvas.height / 2;

                // Desenha a linha de forma centralizada e espelhada
                for (let i = 0; i < numberOfBars; i++) {
                    // Mapeia as frequências da música para preencher a tela horizontalmente
                    const dataIndex = Math.floor((i / numberOfBars) * bufferLength);
                    let value = dataArray[dataIndex] || 0;

                    // Normaliza e amplifica o ganho para a batida da música
                    let barHeight = (value / 255) * (canvas.height * 0.85);
                    
                    // Se estiver em silêncio, mantém a linha horizontal contínua de 2px de altura
                    if (barHeight < 2) barHeight = 2; 

                    const x = i * totalBarWidth;
                    
                    // Desenha a barra em branco sólido (idêntico à imagem original)
                    canvasCtx.fillStyle = '#FFFFFF';
                    canvasCtx.fillRect(x, centerY - barHeight / 2, barWidth, barHeight);
                }
            }

            // Escuta o clique na tela para ativar o áudio (exigência de segurança do navegador)
            window.addEventListener('click', initAudio);
        };
    </script>
</body>
</html>
