<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Áudio Oficial</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #121214; /* Fundo escuro para enxergar a linha */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
        }
        .visualizer-container {
            width: 95%;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="visualizer-container">
        <canvas id="visualizer"></canvas>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('visualizer');
            const canvasCtx = canvas.getContext('2d');
            
            const barWidth = 3;
            const barGap = 2;
            const totalBarWidth = barWidth + barGap;
            
            let numberOfBars = 0;
            let audioCtx = null;
            let analyser = null;
            let dataArray = null;

            function resizeCanvas() {
                canvas.width = canvas.parentElement.clientWidth;
                canvas.height = canvas.parentElement.clientHeight;
                numberOfBars = Math.floor(canvas.width / totalBarWidth);
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // Função que desenha a tela a cada frame
            function draw() {
                requestAnimationFrame(draw);
                
                const centerY = canvas.height / 2;
                canvasCtx.clearRect(0, 0, canvas.width, canvas.height);

                // Se o analisador estiver ativo, pega os dados reais de som
                if (analyser) {
                    analyser.getByteFrequencyData(dataArray);
                }

                for (let i = 0; i < numberOfBars; i++) {
                    let value = 0;
                    
                    if (dataArray && analyser) {
                        // Mapeia as frequências para o número de barras
                        const dataIndex = Math.floor((i / numberOfBars) * analyser.frequencyBinCount);
                        value = dataArray[dataIndex] || 0;
                    }

                    // Calcula a altura baseado no som real
                    let barHeight = (value / 255) * (canvas.height * 0.85);
                    
                    // Se estiver em silêncio absoluto, vira uma linha reta de 2px
                    if (barHeight < 2) barHeight = 2; 

                    const x = i * totalBarWidth;
                    canvasCtx.fillStyle = '#FFFFFF';
                    canvasCtx.fillRect(x, centerY - barHeight / 2, barWidth, barHeight);
                }
            }

            // Ativa a captura de áudio padrão do sistema
            function initAudio() {
                if (audioCtx) return;

                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 512;
                analyser.smoothingTimeConstant = 0.8;
                
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    }, 
                    video: false 
                })
                .then(stream => {
                    const source = audioCtx.createMediaStreamSource(stream);
                    source.connect(analyser);
                })
                .catch(err => {
                    console.error("Dispositivo de áudio não encontrado:", err);
                });
            }

            // Inicia o desenho imediatamente (em silêncio/linha reta)
            draw();

            // Ativa o áudio ao interagir (essencial para o OBS)
            window.addEventListener('click', initAudio);
        });
    </script>
</body>
</html>
