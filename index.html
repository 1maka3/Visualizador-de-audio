<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Áudio - OBS Stream</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: transparent; /* Totalmente transparente para a live */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
        }
        .visualizer-container {
            width: 95%;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div class="visualizer-container">
        <canvas id="visualizer"></canvas>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('visualizer');
            const canvasCtx = canvas.getContext('2d');
            
            const barWidth = 3;
            const barGap = 2;
            const totalBarWidth = barWidth + barGap;
            
            let numberOfBars = 0;
            let currentVolume = 0;

            function resizeCanvas() {
                canvas.width = canvas.parentElement.clientWidth;
                canvas.height = canvas.parentElement.clientHeight;
                numberOfBars = Math.floor(canvas.width / totalBarWidth);
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // Captura o áudio processado que o OBS injeta diretamente no widget
            if (window.obsStudio && window.obsStudio.on) {
                window.obsStudio.on('obsAudioLevel', (audioLevels) => {
                    // audioLevels traz o volume de todos os canais ativos em formato de array de dB
                    if (audioLevels && audioLevels.length > 0) {
                        // Converte o pico de áudio de dB para uma escala linear (0.0 a 1.0)
                        let db = audioLevels[0]; // Canal esquerdo/principal
                        let linear = Math.pow(10, db / 20);
                        currentVolume = linear;
                    }
                });
            } else {
                // Se estiver no navegador padrão (teste), faz uma oscilação bem leve
                // para provar que a linha branca horizontal está renderizando
                setInterval(() => {
                    currentVolume = 0.02 + Math.random() * 0.03;
                }, 100);
            }

            function draw() {
                requestAnimationFrame(draw);
                canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
                const centerY = canvas.height / 2;

                // Suaviza a queda das barras para dar o efeito dinâmico clássico
                currentVolume *= 0.92;

                for (let i = 0; i < numberOfBars; i++) {
                    // Desenha o formato de onda espelhado a partir do centro
                    let fatorForma = Math.sin((i / numberOfBars) * Math.PI);
                    
                    // Amplifica o volume capturado para dar altura às barras brancas
                    let barHeight = (currentVolume * 400) * fatorForma * (0.7 + Math.random() * 0.3);
                    
                    if (barHeight < 2) barHeight = 2; // Linha horizontal contínua

                    const x = i * totalBarWidth;
                    canvasCtx.fillStyle = '#FFFFFF';
                    canvasCtx.fillRect(x, centerY - barHeight / 2, barWidth, barHeight);
                }
            }

            draw();
        });
    </script>
</body>
</html>
